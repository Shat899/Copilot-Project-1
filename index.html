<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bucks2Bar</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
    }
    .input-income {
      border-left: 4px solid #198754;
    }
    .input-expense {
      border-left: 4px solid #dc3545;
    }
    #chartContainer {
      max-width: 900px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">&#128181; Bucks2Bar</span>
    </div>
  </nav>

  <div class="container">
    <!-- Username Form -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <label for="usernameInput" class="form-label fw-semibold">Username</label>
        <input
          type="text"
          class="form-control"
          id="usernameInput"
          placeholder="Enter username"
          autocomplete="off"
        />
        <div id="usernameError" class="form-text text-danger mt-1" style="display:none;"></div>
        <div id="usernameSuccess" class="form-text text-success mt-1" style="display:none;">Username accepted!</div>
        <button class="btn btn-sm mt-3" id="usernameSubmit" style="background-color:#e91e8c;color:#fff;">Submit</button>
      </div>
    </div>

    <!-- Tabs -->
    <ul class="nav nav-tabs mb-4" id="mainTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button
          class="nav-link active"
          id="data-tab"
          data-bs-toggle="tab"
          data-bs-target="#data-pane"
          type="button"
          role="tab"
          aria-controls="data-pane"
          aria-selected="true"
        >Data</button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="chart-tab"
          data-bs-toggle="tab"
          data-bs-target="#chart-pane"
          type="button"
          role="tab"
          aria-controls="chart-pane"
          aria-selected="false"
        >Chart</button>
      </li>
    </ul>

    <div class="tab-content" id="mainTabContent">
      <!-- DATA TAB -->
      <div class="tab-pane fade show active" id="data-pane" role="tabpanel" aria-labelledby="data-tab">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-4">Monthly Income &amp; Expenses</h5>
            <div class="table-responsive">
              <table class="table table-bordered align-middle">
                <thead class="table-dark">
                  <tr>
                    <th style="width:120px">Month</th>
                    <th>
                      <span class="text-success">&#9650;</span> Income (&pound;)
                    </th>
                    <th>
                      <span class="text-danger">&#9660;</span> Expenses (&pound;)
                    </th>
                    <th>Net (&pound;)</th>
                  </tr>
                </thead>
                <tbody id="monthTableBody"></tbody>
                <tfoot class="table-secondary fw-bold">
                  <tr>
                    <td>Total</td>
                    <td id="totalIncome" class="text-success">0.00</td>
                    <td id="totalExpense" class="text-danger">0.00</td>
                    <td id="totalNet">0.00</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- CHART TAB -->
      <div class="tab-pane fade" id="chart-pane" role="tabpanel" aria-labelledby="chart-tab">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title mb-4">Income vs Expenses — Bar Chart</h5>
            
            <div id="chartContainer">
              <button class="btn btn-sm btn-primary mb-3" id="downloadChart">Download Chart</button>
              <canvas id="barChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById('usernameSubmit').addEventListener('click', function () {
      const value = document.getElementById('usernameInput').value;
      const errorEl = document.getElementById('usernameError');
      const successEl = document.getElementById('usernameSuccess');
      const errors = [];

      if (value.length < 5) errors.push('at least 5 characters');
      if (!/[A-Z]/.test(value)) errors.push('at least 1 uppercase letter');
      if (!/[0-9]/.test(value)) errors.push('at least 1 number');
      if (!/[^A-Za-z0-9]/.test(value)) errors.push('at least 1 special character');

      if (errors.length > 0) {
        errorEl.textContent = 'Username must contain: ' + errors.join(', ') + '.';
        errorEl.style.display = 'block';
        successEl.style.display = 'none';
      } else {
        errorEl.style.display = 'none';
        successEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
